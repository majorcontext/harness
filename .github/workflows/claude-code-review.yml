name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Collapse previous Claude reviews
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: ./.github/scripts/collapse-previous-reviews.sh

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            Use the /code-review skill to review this pull request.

            This is a Go agent harness (engine, provider transcoders, plugin
            protocol). Read AGENTS.md first and review with these priorities:
            - Race conditions, deadlocks, missing synchronization — the engine,
              plugin host, and streams are heavily concurrent
            - Protocol correctness (plugin JSON-RPC framing, hook chaining
              semantics, manifest/lazy-spawn invariants)
            - Transcoding correctness (canonical <-> provider wire formats,
              ProviderData replay/drop rules, tool-call ID stability)
            - Startup-speed regressions: any init-time network, disk, or
              subprocess work is a bug per AGENTS.md
            - Testing rules from AGENTS.md: TDD, no raw sleeps, synctest for
              timer logic
            - Bugs, logic errors, nil/zero-value pitfalls, unchecked errors

            Don't flag pure style preferences or formatting. Be concise and
            specific — quote the relevant code, explain why it's a problem, and
            suggest a fix.

            Use inline comments for specific code issues. Use a top-level PR
            comment for the overall summary.
          claude_args: |
            --model claude-opus-4-8
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(go build:*),Bash(go vet:*),Bash(go test:*),Bash(gofmt:*),Bash(node --test:*)"

      - name: Verify Claude review actually ran
        if: always()
        run: |
          set -euo pipefail
          FILE="/home/runner/work/_temp/claude-execution-output.json"

          if [ ! -f "$FILE" ]; then
            echo "::error::Claude execution output file not found at $FILE — cannot confirm the review ran, treating as failure."
            exit 1
          fi

          # The file may be a single JSON object or an array of turn objects,
          # depending on the action version. Check defensively for either shape.
          IS_ERROR=$(jq -r '
            if type == "array" then
              (any(.[]; (.is_error // false) == true))
            else
              (.is_error // false) == true
            end
          ' "$FILE")

          if [ "$IS_ERROR" = "true" ]; then
            echo "::error::Claude Code Review execution log reports is_error=true — the underlying model call failed (e.g. API error or usage cap) even though the action step reported success. Failing the check instead of reporting a false green."
            exit 1
          fi

          echo "Claude review execution output verified: no is_error evidence found."
