name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # No go.sum: the module has zero dependencies (by design).
          cache: false

      - run: go build ./...

      - run: go test -race ./...

      - run: go vet ./...

      - run: test -z "$(gofmt -l .)"

      - name: Inspector unit tests
        # The session inspector is a single build-free HTML file; its pure
        # helpers (SSE parser + formatters) are unit-tested with node's built-in
        # test runner. ubuntu-latest ships Node preinstalled, so no
        # actions/setup-node is needed. The glob (not a bare directory) is
        # deliberate: `node --test` treats a positional directory path as a file
        # to execute, not a tree to scan, so the shell expands the glob to the
        # test file, which the runner then runs directly.
        run: node --test tools/inspector/*_test.mjs

      - name: Startup budget
        # AGENTS.md: startup speed is a CI-enforced budget. Best-of-5 keeps
        # shared-runner noise out; the bound is generous versus the ~5ms
        # local target but still catches any accidental init-time work
        # (network, config scans, subprocess spawns).
        run: |
          go build -o harness ./cmd/harness/
          ./harness version > /dev/null  # warm page cache
          best=999999
          for i in 1 2 3 4 5; do
            start=$(date +%s%N)
            ./harness version > /dev/null
            elapsed=$(( ($(date +%s%N) - start) / 1000000 ))
            [ "$elapsed" -lt "$best" ] && best=$elapsed
          done
          echo "best-of-5 startup: ${best}ms (budget: 50ms)"
          [ "$best" -le 50 ]
