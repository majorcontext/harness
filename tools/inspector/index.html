<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>harness session inspector</title>
<!--
  harness session inspector — a single self-contained page. No build step, no
  external resources: open it straight from file:// or serve it from any static
  host. It talks to a `harness serve` instance over its HTTP+SSE API, so that
  instance must be started with -cors-origin set to this page's origin (or "*"
  for local hacking). See docs/deploy-modal.md ("Inspecting sessions").

  SECURITY: the base URL and run token are persisted in this browser's
  localStorage in plaintext so a reload can reconnect. Treat this as a dev tool
  — don't host it on a shared origin with a long-lived token. Tokens are
  workspace-scoped and rotate with the workspace.

  The pure helpers below (SSE parser + formatters) are unit-tested by
  inspector_test.mjs (run: node --test tools/inspector/*_test.mjs). The steps
  here cover the DOM/network behavior that can only be checked by hand:
    1. Start:  HARNESS_RUN_TOKEN=t harness serve -cors-origin '*'
    2. Open this file, paste the base URL (http://localhost:4096) + token, Connect.
       -> status dot turns green; existing sessions list on the left, newest first.
    3. Click "new session" -> a session appears and is selected.
    4. Type in the prompt box, Send -> user bubble appears, then streaming
       assistant text in a draft bubble, replaced by the durable message.
    5. While a prompt runs, the prompt box + Send are disabled (busy badge).
       Sending to a busy session anyway surfaces a "busy" notice (409).
    6. tool_call blocks render collapsed with a toggle; reasoning renders dimmed
       and collapsed; a tool_result with is_error is red-tinted.
    7. session.error / session.aborted show as inline banners in the timeline.
    8. Kill `harness serve`, wait -> status flips to "reconnecting…" and keeps
       retrying with backoff. Restart serve -> it reconnects and resyncs.
    9. Reload the page -> base URL + token are restored from localStorage.
   10. Toggle OS light/dark theme -> both variants are legible.
-->
<style>
  /* ---------------------------------------------------------------------
     Palette: warm paper neutrals + one committed accent (burnt rust/clay).
     Status colors are a single explicit mapping reused everywhere a status
     appears (session badges, the goal chip, the connection dot) rather than
     invented ad hoc per component. Light-surface direction by default; the
     dark variant below is a fully-committed second pass, not a dimmed
     afterthought, so the OS toggle stays legible either way.
     --------------------------------------------------------------------- */
  :root {
    color-scheme: light;
    --paper: #f4f0e8; --surface: #fffefb; --surface-2: #ece6d9; --line: #ddd4c2; --line-strong: #c9bda3;
    --ink: #241f18; --ink-dim: #6b6153; --ink-faint: #948a79;
    --accent: #b3401b; --accent-ink: #fff9f2; --accent-wash: #f4dccb;
    --st-idle: #6b6153; --st-idle-bg: #eae4d6;
    --st-busy: #a3690a; --st-busy-bg: #f3dfae;
    --st-ok: #2f6d3f; --st-ok-bg: #dbe9dc;
    --st-error: #a3271f; --st-error-bg: #f4dcd8;
    --shadow-1: 0 1px 1px rgba(36,31,24,.05), 0 2px 4px rgba(36,31,24,.04);
    --shadow-2: 0 1px 2px rgba(36,31,24,.06), 0 4px 8px rgba(36,31,24,.05), 0 12px 24px rgba(36,31,24,.05);
    --font-serif: "Iowan Old Style", "Palatino Linotype", Palatino, "URW Palladio", Georgia, serif;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", "DejaVu Sans Mono", Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --paper: #1b1712; --surface: #241f18; --surface-2: #2c261d; --line: #3c3527; --line-strong: #4d4433;
      --ink: #ede6d8; --ink-dim: #b3a892; --ink-faint: #8a8069;
      --accent: #e2762f; --accent-ink: #1b1712; --accent-wash: #402515;
      --st-idle: #b3a892; --st-idle-bg: #322c21;
      --st-busy: #e2b04a; --st-busy-bg: #3c2f14;
      --st-ok: #6fbb7f; --st-ok-bg: #223626;
      --st-error: #e2726a; --st-error-bg: #3a211e;
      --shadow-1: 0 1px 1px rgba(0,0,0,.28), 0 2px 4px rgba(0,0,0,.22);
      --shadow-2: 0 1px 2px rgba(0,0,0,.3), 0 4px 8px rgba(0,0,0,.26), 0 12px 24px rgba(0,0,0,.24);
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 400 14px/1.5 var(--font-sans);
    background: var(--paper); color: var(--ink);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  .tabular { font-variant-numeric: tabular-nums; }
  .mono { font-family: var(--font-mono); }
  .label {
    font: 600 11px/1 var(--font-sans); text-transform: uppercase; letter-spacing: .07em;
    color: var(--ink-faint);
  }
  header {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    padding: 12px 20px; background: var(--surface);
    box-shadow: var(--shadow-1);
  }
  .brand { display: flex; align-items: baseline; gap: 8px; margin-right: 8px; }
  .brand-mark { font: 600 20px/1 var(--font-serif); color: var(--ink); }
  .brand-sub { font: 600 11px/1 var(--font-sans); text-transform: uppercase; letter-spacing: .09em; color: var(--accent); }
  .connect-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  header input {
    background: var(--paper); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 12px; font: 400 13px/1.2 var(--font-sans);
    transition: border-color .15s ease-out;
  }
  header input:focus { outline: none; border-color: var(--accent); }
  #base { width: 230px; } #token { width: 180px; }
  button {
    background: var(--surface); color: var(--ink); border: 1px solid var(--line);
    border-radius: 999px; padding: 8px 16px; font: 600 13px/1 var(--font-sans); cursor: pointer;
    transition: border-color .15s ease-out, background-color .15s ease-out, transform .1s ease-out;
  }
  button:hover:not(:disabled) { border-color: var(--line-strong); background: var(--surface-2); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button.primary {
    background: var(--accent); color: var(--accent-ink); border-color: var(--accent);
  }
  button.primary:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); opacity: .92; }
  .status { display: flex; align-items: center; gap: 8px; margin-left: auto; color: var(--ink-dim); font-weight: 500; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--st-idle); }
  .dot.on { background: var(--st-ok); } .dot.re { background: var(--st-busy); }
  main { display: flex; flex: 1; min-height: 0; }

  /* ---------------- session sidebar ---------------- */
  .sidebar { width: 300px; border-right: 1px solid var(--line); display: flex; flex-direction: column; flex-shrink: 0; background: var(--paper); }
  .sidebar-head { padding: 16px 20px 8px; }
  #sessions { flex: 1; overflow-y: auto; }
  .sess { padding: 12px 20px; border-bottom: 1px solid var(--line); border-left: 4px solid transparent; cursor: pointer; }
  .sess:hover { background: var(--surface-2); }
  .sess.sel { background: var(--surface); border-left-color: var(--accent); }
  .sess .id { font: 600 13px/1.2 var(--font-mono); color: var(--ink); }
  .sess .meta { color: var(--ink-dim); font-size: 12px; margin-top: 8px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .empty { color: var(--ink-faint); text-align: center; margin-top: 40px; font: italic 400 15px/1.5 var(--font-serif); padding: 0 20px; }

  /* explicit status→color mapping, reused by session badges and the goal chip */
  .badge {
    border-radius: 4px; padding: 4px 8px; font: 600 10px/1.6 var(--font-sans);
    text-transform: uppercase; letter-spacing: .06em;
  }
  .badge.busy, .goalchip.active .goaltag { background: var(--st-busy-bg); color: var(--st-busy); }
  .badge.idle { background: var(--st-idle-bg); color: var(--st-idle); }

  #right { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  #timeline { flex: 1; overflow-y: auto; padding: 24px 32px; }

  /* #goalstrip sits between the scrolling #timeline and the composer, outside
     the scroll region, so the goal chip stays visible while a busy streaming
     session scrolls the timeline. It collapses to nothing when empty. */
  #goalstrip { flex-shrink: 0; padding: 0 32px; background: var(--paper); border-bottom: 1px solid transparent; }
  #goalstrip:empty { display: none; border-bottom: none; padding: 0; }

  .msg { margin: 0 0 20px; max-width: 720px; }
  .role { font: 600 11px/1 var(--font-sans); text-transform: uppercase; letter-spacing: .07em; color: var(--ink-faint); margin-bottom: 8px; }
  .bubble { border-radius: 10px; padding: 12px 16px; background: var(--surface); box-shadow: var(--shadow-1); }
  .bubble.user { background: var(--accent-wash); }
  .bubble.assistant { background: var(--surface); }
  .text { white-space: pre-wrap; word-break: break-word; }

  /* dense tool/reasoning data reads as a flat, bordered row (a semantic
     left rule), not another shadowed card — keeps the timeline from turning
     into a stack of identical boxes. */
  details.tool, details.reason {
    border-left: 4px solid var(--line-strong); margin: 8px 0; background: transparent;
  }
  details.reason { border-left-color: var(--ink-faint); color: var(--ink-dim); }
  summary { cursor: pointer; padding: 8px 0 8px 12px; font: 500 13px/1.3 var(--font-mono); }
  details .body { padding: 0 0 8px 16px; }
  pre.code {
    margin: 0; white-space: pre-wrap; word-break: break-word;
    font: 12px/1.5 var(--font-mono);
    background: var(--surface-2); border-radius: 8px; padding: 12px;
    overflow-x: auto;
  }
  .toolres { border-left: 4px solid var(--st-ok); padding: 4px 0 4px 12px; margin: 8px 0; }
  .toolres.err { border-left-color: var(--st-error); background: var(--st-error-bg); border-radius: 0 8px 8px 0; }
  .toolres .role { color: var(--ink-faint); }
  .toolres.err .role { color: var(--st-error); }

  .banner {
    border-left: 4px solid var(--st-error); padding: 8px 0 8px 12px; margin: 12px 0; max-width: 720px;
    color: var(--ink);
  }
  .banner.abort { border-left-color: var(--ink-faint); color: var(--ink-dim); }

  .goalchip {
    border-radius: 10px; padding: 12px 16px; margin: 16px 0; max-width: 720px;
    background: var(--surface); box-shadow: var(--shadow-1);
    display: flex; flex-direction: column; gap: 8px; border-left: 4px solid var(--st-idle);
  }
  .goalchip.active { border-left-color: var(--st-busy); }
  .goalchip.achieved { border-left-color: var(--st-ok); }
  .goalchip.cleared { border-left-color: var(--st-idle); color: var(--ink-dim); }
  .goaltag {
    display: inline-block; width: fit-content;
    font: 600 10px/1.6 var(--font-sans); text-transform: uppercase; letter-spacing: .06em;
    color: var(--ink-faint); background: var(--st-idle-bg); border-radius: 4px; padding: 4px 8px;
  }
  .goalchip.achieved .goaltag { background: var(--st-ok-bg); color: var(--st-ok); }
  .goalchip.cleared .goaltag { background: var(--st-idle-bg); color: var(--st-idle); }
  .goalcond { font: 600 16px/1.35 var(--font-serif); color: var(--ink); }
  .goalreason { color: var(--ink-dim); font-size: 13px; }

  .streaming { opacity: .92; }
  .streaming .role::after { content: " · streaming…"; color: var(--accent); text-transform: none; letter-spacing: 0; }

  #composer { border-top: 1px solid var(--line); padding: 16px 32px; background: var(--surface); }
  #composer textarea {
    width: 100%; resize: vertical; min-height: 60px; font: 400 14px/1.5 var(--font-sans);
    background: var(--paper); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 12px; transition: border-color .15s ease-out;
  }
  #composer textarea:focus { outline: none; border-color: var(--accent); }
  #composer textarea:disabled { opacity: .5; }
  .composer-row { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
  .notice { color: var(--st-error); font-size: 13px; font-weight: 500; min-height: 18px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="brand-mark">harness</span><span class="brand-sub">Inspector</span></div>
    <div class="connect-group">
      <input id="base" placeholder="http://localhost:4096" autocomplete="off" spellcheck="false">
      <input id="token" type="password" placeholder="run token" autocomplete="off"
             title="stored in this browser's localStorage in plaintext — use a dev token on a private origin">
      <button id="connect" class="primary">Connect</button>
    </div>
    <span class="status"><span id="dot" class="dot"></span><span id="statusText">disconnected</span></span>
  </header>
  <main>
    <div class="sidebar">
      <div class="sidebar-head"><span class="label">Sessions</span></div>
      <div id="sessions"><div class="empty">not connected</div></div>
    </div>
    <div id="right">
      <div id="timeline"><div class="empty">select a session</div></div>
      <div id="goalstrip"></div>
      <div id="composer">
        <div class="notice" id="notice"></div>
        <textarea id="prompt" placeholder="Message… (Enter to send, Shift+Enter for newline)" disabled></textarea>
        <div class="composer-row">
          <button id="send" class="primary" disabled>Send</button>
          <button id="newSession" disabled>+ New session</button>
        </div>
      </div>
    </div>
  </main>

<script>
"use strict";

/* ---------- pure helpers (kept small and side-effect free) ---------- */
/* TESTABLE-BEGIN — the region below is extracted verbatim by
   inspector_test.mjs and evaluated in a node:vm sandbox. Keep it pure
   (no DOM, no globals beyond Date/JSON) so the single-file page stays
   build-free while its logic is still unit-tested. */

// shortId trims a "prefix_hexhex…" id to its prefix plus a few hex chars.
function shortId(id) {
  if (!id) return "";
  const u = id.indexOf("_");
  return u >= 0 ? id.slice(0, u + 7) : id.slice(0, 8);
}

function fmtTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return isNaN(d) ? "" : d.toLocaleString();
}

// prettyJSON pretty-prints a value that may be a JSON string, an object, or
// something unparseable (returned verbatim).
function prettyJSON(v) {
  if (v == null) return "";
  let obj = v;
  if (typeof v === "string") {
    try { obj = JSON.parse(v); } catch { return v; }
  }
  try { return JSON.stringify(obj, null, 2); } catch { return String(v); }
}

// sortSessions orders newest-created first.
function sortSessions(list) {
  return list.slice().sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
}

// partsText concatenates the text of Text parts (used for tool_result content).
function partsText(parts) {
  if (!Array.isArray(parts)) return "";
  return parts.filter(p => p && p.type === "text").map(p => p.text || "").join("\n");
}

// maxSeq returns the largest `seq` across a session list (0 if none). The SSE
// stream is opened from this cursor so replay picks up exactly what the REST
// snapshot did not yet include — no gap, no double-counting.
function maxSeq(list) {
  let m = 0;
  for (const s of list) if (typeof s.seq === "number" && s.seq > m) m = s.seq;
  return m;
}

// reduceGoal folds one goal.* journal event into a goal-summary object
// ({condition, active, achieved, reason}). Non-goal events return prev
// unchanged (same reference); goal events return a fresh object so the input is
// never mutated. Drives the goal chip purely from journal events.
function reduceGoal(prev, ev) {
  const isGoal = ev && typeof ev.type === "string" && ev.type.indexOf("goal.") === 0;
  if (!isGoal) return prev;
  const g = Object.assign({ condition: "", active: false, achieved: false, reason: "" }, prev);
  switch (ev.type) {
    case "goal.set":
      g.condition = ev.goal_condition || "";
      g.active = true; g.achieved = false; g.reason = "";
      break;
    case "goal.eval":
      if (ev.goal_reason) g.reason = ev.goal_reason;
      break;
    case "goal.achieved":
      g.active = false; g.achieved = true;
      if (ev.goal_reason) g.reason = ev.goal_reason;
      break;
    case "goal.cleared":
      g.active = false;
      break;
  }
  return g;
}

// goalFromSession maps a session JSON's `goal` field into the same
// goal-summary shape reduceGoal produces. Goal state is otherwise sourced
// only from the event stream, whose replay cursor starts at the global
// high-water seq — so a goal.set predating connection is never replayed.
// Seeding from the session record on select closes that bootstrap gap,
// exactly as message history is fetched on select rather than replayed.
function goalFromSession(sess) {
  const g = sess && sess.goal;
  if (!g || !g.condition) return null;
  return {
    condition: g.condition,
    active: !!g.active,
    achieved: !g.active && !!g.achieved,
    reason: g.last_reason || "",
  };
}

/* ---------- SSE frame parser ----------
   Feed it decoded stream text; it invokes onEvent({id, data}) once per complete
   frame (terminated by a blank line). Handles: multi-line data (joined with
   "\n"), id lines, and comment lines beginning with ":". Values keep an
   optional single leading space stripped, per the SSE spec. Stateful across
   chunk boundaries. */
function createSSEParser(onEvent) {
  let buf = "", data = [], id = null;
  return function feed(chunk) {
    buf += chunk;
    let nl;
    while ((nl = buf.indexOf("\n")) >= 0) {
      let line = buf.slice(0, nl);
      buf = buf.slice(nl + 1);
      if (line.endsWith("\r")) line = line.slice(0, -1);
      if (line === "") {                      // blank line: dispatch frame
        if (data.length) onEvent({ id, data: data.join("\n") });
        // Per the WHATWG SSE spec the last-event-ID buffer persists across
        // frames — it is replaced only by a new `id:` line, never cleared when
        // a frame omits one. Reset only the data buffer here.
        data = [];
        continue;
      }
      if (line[0] === ":") continue;          // comment / heartbeat
      const c = line.indexOf(":");
      let field, value;
      if (c === -1) { field = line; value = ""; }
      else {
        field = line.slice(0, c);
        value = line.slice(c + 1);
        if (value[0] === " ") value = value.slice(1);
      }
      if (field === "data") data.push(value);
      else if (field === "id") id = value;
      // "event"/"retry" fields are unused by this API and ignored.
    }
  };
}
/* TESTABLE-END */

/* ---------- app state ---------- */

const state = {
  base: "", token: "",
  running: false, abort: null, timer: null, backoff: 500, lastSeq: 0,
  sessions: new Map(),          // id -> {id, model, status, messages, created_at, seq}
  goals: new Map(),             // id -> {condition, active, achieved, reason} (from goal.* events)
  selected: null,
  messages: [],                 // durable messages for the selected session
  banners: [],                  // {type, text} inline banners for selected session
  draft: null,                  // {text, reasoning, tools:[{call_id,name,arguments,output,is_error,running}]}
};

function freshDraft() { return { text: "", reasoning: "", tools: [] }; }
function resetDraft() { state.draft = null; }

/* ---------- DOM helpers ---------- */

const $ = id => document.getElementById(id);

function el(tag, attrs, ...kids) {
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === "class") n.className = attrs[k];
    else if (k === "text") n.textContent = attrs[k];
    else if (k in n) n[k] = attrs[k];
    else n.setAttribute(k, attrs[k]);
  }
  for (const kid of kids) if (kid != null) n.append(kid);
  return n;
}

/* ---------- HTTP ---------- */

async function api(method, path, body) {
  const opts = { method, headers: { Authorization: "Bearer " + state.token } };
  if (body !== undefined) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  return fetch(state.base + path, opts);
}

/* ---------- session list ---------- */

function upsertSession(s) {
  const cur = state.sessions.get(s.id) || {};
  state.sessions.set(s.id, Object.assign({ status: "idle", messages: 0 }, cur, s));
}

function renderSessions() {
  const box = $("sessions");
  box.textContent = "";
  const list = sortSessions([...state.sessions.values()]);
  if (!list.length) { box.append(el("div", { class: "empty", text: state.running ? "no sessions" : "not connected" })); return; }
  for (const s of list) {
    const node = el("div", { class: "sess" + (s.id === state.selected ? " sel" : ""), title: s.id },
      el("div", { class: "id mono tabular", text: shortId(s.id) }),
      el("div", { class: "meta" },
        el("span", { class: "badge " + (s.status === "busy" ? "busy" : "idle"), text: s.status || "idle" }),
        el("span", { text: s.model || "—" }),
        el("span", { class: "tabular", text: (s.messages || 0) + " msg" }),
        el("span", { class: "mono tabular", text: fmtTime(s.created_at) }),
      ),
    );
    node.onclick = () => selectSession(s.id);
    box.append(node);
  }
}

/* ---------- timeline rendering ---------- */

function renderTimeline() {
  const tl = $("timeline");
  const gs = $("goalstrip");
  tl.textContent = "";
  gs.textContent = "";
  if (!state.selected) { tl.append(el("div", { class: "empty", text: "select a session" })); return; }
  // The goal chip mounts in #goalstrip, a fixed strip between the scrolling
  // #timeline and the composer, so it survives auto-scroll during a busy
  // streaming session instead of being pushed off with the rest of the feed.
  const goal = state.goals.get(state.selected);
  if (goal && goal.condition) gs.append(renderGoalChip(goal));
  const msgs = state.messages.slice().sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  if (!msgs.length && !state.draft && !state.banners.length) {
    tl.append(el("div", { class: "empty", text: "no messages yet" }));
  }
  for (const m of msgs) tl.append(renderMessage(m));
  for (const b of state.banners) tl.append(renderBanner(b));
  if (state.draft) tl.append(renderDraft(state.draft));
  tl.scrollTop = tl.scrollHeight;
}

function renderMessage(m) {
  const wrap = el("div", { class: "msg" }, el("div", { class: "role", text: m.role }));
  const parts = Array.isArray(m.parts) ? m.parts : [];
  const bubble = el("div", { class: "bubble " + m.role });
  let bubbleUsed = false;
  for (const p of parts) {
    if (!p) continue;
    if (p.type === "text") { bubble.append(el("div", { class: "text", text: p.text || "" })); bubbleUsed = true; }
    else if (p.type === "reasoning") wrap.append(renderReasoning(p.text || ""));
    else if (p.type === "tool_call") wrap.append(renderToolCall(p));
    else if (p.type === "tool_result") wrap.append(renderToolResult(p.content, p.is_error));
    else if (p.type === "blob") { bubble.append(el("div", { class: "text", text: "[blob " + (p.media_type || "") + "]" })); bubbleUsed = true; }
  }
  if (bubbleUsed) wrap.append(bubble);
  return wrap;
}

function renderReasoning(text) {
  return el("details", { class: "reason" },
    el("summary", { text: "reasoning" }),
    el("div", { class: "body" }, el("div", { class: "text", text })));
}

function renderToolCall(p) {
  return el("details", { class: "tool" },
    el("summary", { text: "tool · " + (p.name || "tool") + (p.running ? " · running…" : "") }),
    el("div", { class: "body" }, el("pre", { class: "code", text: prettyJSON(p.arguments) })));
}

function renderToolResult(content, isErr) {
  return el("div", { class: "toolres" + (isErr ? " err" : "") },
    el("div", { class: "role", text: isErr ? "tool result (error)" : "tool result" }),
    el("div", { class: "text", text: partsText(content) }));
}

// renderGoalChip shows the selected session's goal state: condition, a state
// label (active / achieved / cleared), and the latest evaluator reason. Driven
// purely from journal events via reduceGoal.
function renderGoalChip(g) {
  const state = g.achieved ? "achieved" : g.active ? "active" : "cleared";
  const chip = el("div", { class: "goalchip " + state },
    el("span", { class: "goaltag", text: "goal · " + state }),
    el("span", { class: "goalcond", text: g.condition }));
  if (g.reason) chip.append(el("div", { class: "goalreason", text: g.reason }));
  return chip;
}

function renderBanner(b) {
  const cls = b.type === "session.aborted" ? "banner abort" : "banner";
  const label = b.type === "session.aborted" ? "aborted" : "error";
  return el("div", { class: cls, text: b.text ? label + ": " + b.text : label });
}

function renderDraft(d) {
  const wrap = el("div", { class: "msg streaming" }, el("div", { class: "role", text: "assistant" }));
  if (d.reasoning) wrap.append(renderReasoning(d.reasoning));
  for (const t of d.tools) {
    if (t.output !== undefined || t.is_error) wrap.append(renderToolResult(t.output, t.is_error));
    wrap.append(renderToolCall(t));
  }
  if (d.text) wrap.append(el("div", { class: "bubble assistant" }, el("div", { class: "text", text: d.text })));
  return wrap;
}

/* ---------- selection + bootstrap ---------- */

async function selectSession(id) {
  state.selected = id;
  state.messages = [];
  state.banners = [];
  resetDraft();
  renderSessions();
  renderTimeline();
  updateComposer();
  try {
    // allSettled, not all: a transient failure of either fetch must not
    // discard the other's good response.
    const [msgR, sessR] = await Promise.allSettled([
      api("GET", "/session/" + id + "/message"),
      api("GET", "/session/" + id),
    ]);
    if (state.selected !== id) return;
    if (sessR.status === "fulfilled" && sessR.value.ok) {
      const g = goalFromSession(await sessR.value.json());
      if (g) state.goals.set(id, g);
    }
    if (msgR.status === "fulfilled" && msgR.value.ok) {
      state.messages = await msgR.value.json();
    }
    renderTimeline();
  } catch { /* transient; the stream will refill */ }
}

/* ---------- live event handling ---------- */

function handleEvent(ev) {
  if (typeof ev.seq === "number" && ev.seq > state.lastSeq) state.lastSeq = ev.seq;
  const sid = ev.session_id;
  const sel = sid === state.selected;
  switch (ev.type) {
    case "session.created":
      upsertSession({ id: sid, model: ev.model, status: "idle", created_at: new Date().toISOString(), seq: ev.seq });
      renderSessions();
      break;
    case "session.status": {
      const s = state.sessions.get(sid);
      if (s) { s.status = ev.status; renderSessions(); if (sel) updateComposer(); }
      break;
    }
    case "model": {
      const s = state.sessions.get(sid);
      if (s) { s.model = ev.model; renderSessions(); }
      break;
    }
    case "message": {
      const s = state.sessions.get(sid);
      if (s) { s.messages = (s.messages || 0) + 1; renderSessions(); }
      if (sel && ev.message) {
        if (!state.messages.some(m => m.id === ev.message.id)) state.messages.push(ev.message);
        resetDraft();
        renderTimeline();
      }
      break;
    }
    case "session.error":
      if (sel) { state.banners.push({ type: ev.type, text: ev.error }); renderTimeline(); }
      break;
    case "session.aborted":
      if (sel) { state.banners.push({ type: ev.type, text: ev.error }); renderTimeline(); }
      break;
    case "goal.set":
    case "goal.eval":
    case "goal.achieved":
    case "goal.cleared":
      state.goals.set(sid, reduceGoal(state.goals.get(sid), ev));
      if (sel) renderTimeline();
      break;
    case "text.delta":
      if (sel) { (state.draft || (state.draft = freshDraft())).text += ev.text || ""; renderTimeline(); }
      break;
    case "reasoning.delta":
      if (sel) { (state.draft || (state.draft = freshDraft())).reasoning += ev.text || ""; renderTimeline(); }
      break;
    case "tool.start":
      if (sel && ev.tool_call) {
        const d = state.draft || (state.draft = freshDraft());
        d.tools.push({ call_id: ev.tool_call.call_id, name: ev.tool_call.name, arguments: ev.tool_call.arguments, running: true });
        renderTimeline();
      }
      break;
    case "tool.end":
      if (sel && ev.tool_call) {
        const d = state.draft || (state.draft = freshDraft());
        const t = d.tools.find(x => x.call_id === ev.tool_call.call_id);
        if (t) { t.running = false; t.output = ev.output; t.is_error = ev.is_error; }
        renderTimeline();
      }
      break;
  }
}

/* ---------- connection + reconnect ---------- */

function setStatus(kind, label) {
  $("dot").className = "dot" + (kind === "on" ? " on" : kind === "re" ? " re" : "");
  $("statusText").textContent = label;
}

async function resync() {
  const resp = await api("GET", "/session");
  if (!resp.ok) throw new Error("session list " + resp.status);
  const list = await resp.json();
  state.sessions = new Map(list.map(s => [s.id, s]));
  // Advance the replay cursor to the snapshot's high-water mark so the stream
  // resumes exactly where the REST view ends.
  const hw = maxSeq(list);
  if (hw > state.lastSeq) state.lastSeq = hw;
  renderSessions();
  if (state.selected && state.sessions.has(state.selected)) selectSession(state.selected);
  else if (state.selected) { state.selected = null; state.messages = []; renderTimeline(); updateComposer(); }
}

async function connectStream() {
  const ac = new AbortController();
  state.abort = ac;
  try {
    await resync();
    const resp = await fetch(state.base + "/event?from=" + state.lastSeq, {
      headers: { Authorization: "Bearer " + state.token }, signal: ac.signal,
    });
    if (!resp.ok || !resp.body) throw new Error("event stream " + resp.status);
    setStatus("on", "connected");
    state.backoff = 500;
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    const parse = createSSEParser(frame => {
      let ev; try { ev = JSON.parse(frame.data); } catch { return; }
      handleEvent(ev);
    });
    for (;;) {
      const { value, done } = await reader.read();
      if (done) break;
      parse(dec.decode(value, { stream: true }));
    }
  } catch (err) {
    if (!state.running) return;           // deliberate disconnect: stay quiet
  }
  if (state.running) scheduleReconnect();
}

function scheduleReconnect() {
  setStatus("re", "reconnecting…");
  const delay = state.backoff;
  state.backoff = Math.min(state.backoff * 2, 10000);
  clearTimeout(state.timer);
  state.timer = setTimeout(() => { if (state.running) connectStream(); }, delay);
}

function connect() {
  state.base = $("base").value.trim().replace(/\/+$/, "");
  state.token = $("token").value;
  if (!state.base || !state.token) { $("notice").textContent = "base URL and token are required"; return; }
  localStorage.setItem("harness.base", state.base);
  localStorage.setItem("harness.token", state.token);
  $("notice").textContent = "";
  state.running = true;
  state.backoff = 500;
  state.lastSeq = 0;
  setStatus("re", "connecting…");
  $("connect").textContent = "Disconnect";
  $("newSession").disabled = false;
  connectStream();
}

function disconnect() {
  state.running = false;
  if (state.abort) state.abort.abort();
  clearTimeout(state.timer);
  setStatus("off", "disconnected");
  $("connect").textContent = "Connect";
  $("newSession").disabled = true;
  updateComposer();
}

/* ---------- composer ---------- */

function selectedBusy() {
  const s = state.sessions.get(state.selected);
  return !!(s && s.status === "busy");
}

function updateComposer() {
  const active = state.running && state.selected && !selectedBusy();
  $("prompt").disabled = !active;
  $("send").disabled = !active;
  if (selectedBusy()) $("prompt").placeholder = "session is busy…";
  else $("prompt").placeholder = "Message… (Enter to send, Shift+Enter for newline)";
}

async function send() {
  const text = $("prompt").value.trim();
  if (!text || !state.selected) return;
  $("notice").textContent = "";
  try {
    const resp = await api("POST", "/session/" + state.selected + "/prompt_async",
      { parts: [{ type: "text", text }] });
    if (resp.status === 202) { $("prompt").value = ""; }
    else if (resp.status === 409) { $("notice").textContent = "session is busy — wait for it to finish"; }
    else { $("notice").textContent = "send failed (" + resp.status + ")"; }
  } catch (e) { $("notice").textContent = "send failed: " + e.message; }
}

async function newSession() {
  $("notice").textContent = "";
  try {
    const resp = await api("POST", "/session", {});
    if (resp.status === 201) { const s = await resp.json(); upsertSession(s); renderSessions(); selectSession(s.id); }
    else { $("notice").textContent = "new session failed (" + resp.status + ")"; }
  } catch (e) { $("notice").textContent = "new session failed: " + e.message; }
}

/* ---------- wiring ---------- */

$("connect").onclick = () => (state.running ? disconnect() : connect());
$("send").onclick = send;
$("newSession").onclick = newSession;
$("prompt").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!$("send").disabled) send(); }
});

$("base").value = localStorage.getItem("harness.base") || "";
$("token").value = localStorage.getItem("harness.token") || "";
setStatus("off", "disconnected");
</script>
</body>
</html>
