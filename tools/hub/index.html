  // Goal narrative first (condition-setting context), then the message
  // transcript, then banners, then the draft (kept last, see renderTimeline)
  // — goal.* records read best as a preface + running log, and this
  // ordering is deterministic across reconnects.
  tlDom.narrativeEl = el("div", { class: "tl-narrative" });
  tlDom.messagesEl = el("div", { class: "tl-messages" });
  tlDom.bannersEl = el("div", { class: "tl-banners" });
  tlDom.emptyEl = el("div", { class: "empty", text: "no messages yet" });
  tl.append(tlDom.emptyEl, tlDom.narrativeEl, tlDom.messagesEl, tlDom.bannersEl);
  // Renders pin to the bottom while stuck, but content can keep growing
  // AFTER the last render (font loads, wrapping reflow) — the replay used
  // to end ~50px shy of the bottom. While stuck, any content resize
  // re-pins; a released view is never touched.
  tlDom.ro = new ResizeObserver(() => {
    if (tlDom && tlDom.stick) { tlDom.lastAuto = performance.now(); tl.scrollTop = tl.scrollHeight; }
  });
  tlDom.ro.observe(tlDom.narrativeEl);
  tlDom.ro.observe(tlDom.messagesEl);
  tlDom.ro.observe(tlDom.bannersEl);
}

const TIMELINE_PIN_PX = 32;

function renderTimeline() {
  const tl = $("timeline");
  if (!tlDom || tlDom.key !== timelineSessionKey()) resetTimelineDom(tl);
  if (!drill.sessionId) return;

  // Stickiness is INTENT (tlDom.stick), not geometry inferred per render.
  // Inferring from scrollTop each render broke initial load: async layout
  // growth (font metrics, wrapping) after the LAST replay render left the
  // view ~90px shy of the bottom with no render left to re-pin, so the
  // operator landed mid-transcript. Now: sessions open stuck (see
  // resetTimelineDom), and only user scrolling flips it — the listener
  // fires for programmatic scrolls too, but those always land at the
  // bottom, where isPinnedToBottom re-affirms stick=true.
  if (!tl.dataset.stickListener) {
    tl.dataset.stickListener = "1";
    // Scroll events from our own scrollTop assignments can be delivered
    // AFTER the next burst's append has already grown scrollHeight — the
    // handler then sees a huge gap and wrongly releases stick mid-replay.
    // Guard: ignore scroll events within 120ms of a programmatic pin
    // (tlDom.lastAuto). A wheel-up is unambiguous user intent and releases
    // immediately, so the operator can still escape during a busy stream.
    tl.addEventListener("scroll", () => {
      if (!tlDom) return;
      if (performance.now() - (tlDom.lastAuto || 0) < 120) return;
      tlDom.stick = isPinnedToBottom(tl.scrollTop, tl.scrollHeight, tl.clientHeight, TIMELINE_PIN_PX);
    });
    tl.addEventListener("wheel", e => { if (tlDom && e.deltaY < 0) tlDom.stick = false; }, { passive: true });
  }

  const msgs = drill.messages.slice().sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

  const newNarr = planAppend(tlDom.rendered, drill.narrative, n => (n && typeof n.seq === "number") ? "g:" + n.seq : null);
  for (const n of newNarr) {
    tlDom.rendered.add("g:" + n.seq);
    tlDom.narrativeEl.append(renderGoalNarrativeItem(n.ev));
  }

  const newMsgs = planAppend(tlDom.rendered, msgs, m => (m && m.id) ? "m:" + m.id : null);
  for (const m of newMsgs) {
    tlDom.rendered.add("m:" + m.id);
    tlDom.messagesEl.append(renderMessage(m));
  }

  const newBanners = planAppend(tlDom.rendered, drill.banners.map((b, i) => ({ b, i })), x => "b:" + x.i);
  for (const x of newBanners) {
    tlDom.rendered.add("b:" + x.i);
    tlDom.bannersEl.append(renderBanner(x.b));
  }

  if (drill.draft) {
    if (!tlDom.draftEl) tlDom.draftEl = createDraftEl();
    updateDraftEl(tlDom.draftEl, drill.draft);
    tl.append(tlDom.draftEl); // re-append: a no-op if already last, else moves it to the tail
  } else if (tlDom.draftEl) {
    tlDom.draftEl.remove();
    tlDom.draftEl = null;
  }

  const hasContent = !!(tlDom.narrativeEl.childNodes.length || tlDom.messagesEl.childNodes.length ||
    tlDom.bannersEl.childNodes.length || tlDom.draftEl);
  tlDom.emptyEl.style.display = hasContent ? "none" : "";

  if (tlDom.stick) { tlDom.lastAuto = performance.now(); tl.scrollTop = tl.scrollHeight; }
}

function renderGoalNarrativeItem(ev) {
  switch (ev.type) {
    case "goal.set":
      return el("div", { class: "goalnarr set" },
        el("span", { class: "goaltag", text: "\ud83c\udfaf goal set" }),
        el("div", { class: "goalcond", text: ev.goal_condition || "" }));
    case "goal.eval": {
      const met = !!ev.goal_met;
      return el("div", { class: "goalnarr " + (met ? "eval-met" : "eval-notmet") },
        el("span", { class: "goaltag", text: "turn " + (ev.goal_turn || "?") + " \u00b7 evaluator: " + (met ? "MET" : "NOT MET") }),
        ev.goal_reason ? el("div", { class: "goalreason", text: ev.goal_reason }) : null);
    }
    case "goal.stalled": {
      const waitingOut = !!ev.goal_waiting;
      return el("div", { class: "goalnarr stalled" + (waitingOut ? " waiting" : "") },
        el("span", { class: "goaltag", text: waitingOut
          ? "\u23f3 waiting out provider weather (" + (ev.goal_retryable_class || "retryable") + ", attempt " + (ev.goal_attempt || 1) + ")"
          : "\u26a0\ufe0f stalled (attempt " + (ev.goal_attempt || 1) + ")" }),
        ev.goal_reason ? el("div", { class: "goalreason", text: ev.goal_reason }) : null);
    }
    case "goal.achieved":
      return el("div", { class: "goalnarr achieved" },
        el("span", { class: "goaltag", text: "\u2705 goal achieved \u00b7 " + (ev.goal_turns || 0) + " turn(s)" }),
        ev.goal_reason ? el("div", { class: "goalreason", text: ev.goal_reason }) : null);
    case "goal.cleared":
      return el("div", { class: "goalnarr cleared" },
        el("span", { class: "goaltag", text: "\u25a1 goal cleared" }));
    default:
      return el("div", {});
  }
}

function renderMessage(m) {
  const wrap = el("div", { class: "msg" }, el("div", { class: "role", text: m.role }));
  const parts = Array.isArray(m.parts) ? m.parts : [];
  const bubble = el("div", { class: "bubble " + m.role });
  let bubbleUsed = false;
  for (const p of parts) {
    if (!p) continue;
    if (p.type === "text") { bubble.append(el("div", { class: "text", text: p.text || "" })); bubbleUsed = true; }
    else if (p.type === "reasoning") wrap.append(renderReasoning(p.text || ""));
    else if (p.type === "tool_call") wrap.append(renderToolCall(p));
    else if (p.type === "tool_result") wrap.append(renderToolResult(p.content, p.is_error));
    else if (p.type === "blob") { bubble.append(el("div", { class: "text", text: "[blob " + (p.media_type || "") + "]" })); bubbleUsed = true; }
  }
  if (bubbleUsed) wrap.append(bubble);
  return wrap;
}

// makeReasoningNode builds a <details class=reason> node and stashes a
// reference to its text div (._text) so callers that need to update the
// text in place (the streaming draft) can do so without recreating the
// <details> element — which is what preserves its open/closed toggle state
// across draft updates. renderReasoning (durable, one-shot messages) is
// just this without ever touching ._text again.
function makeReasoningNode(text) {
  const textDiv = el("div", { class: "text", text });
  const node = el("details", { class: "reason" },
    el("summary", { text: "reasoning" }),
    el("div", { class: "body" }, textDiv));
  node._text = textDiv;
  return node;
}

function renderReasoning(text) {
  return makeReasoningNode(text);
}

// toolSummaryText / makeToolCallNode: same split as makeReasoningNode above
// — the <details class=tool> element is created once and its summary/body
// text nodes are stashed (._summary/._pre) so a running tool call's
// arguments/"running…" suffix can be refreshed without recreating (and
// re-collapsing) the element.
function toolSummaryText(t) {
  return "\ud83d\udd27 " + (t.name || "tool") + (t.running ? " \u00b7 running\u2026" : "");
}

function makeToolCallNode(p) {
  const summary = el("summary", { text: toolSummaryText(p) });
  const pre = el("pre", { class: "code", text: prettyJSON(p.arguments) });
  const node = el("details", { class: "tool" }, summary, el("div", { class: "body" }, pre));
  node._summary = summary;
  node._pre = pre;
  return node;
}

function renderToolCall(p) {
  return makeToolCallNode(p);
}

function renderToolResult(content, isErr) {
  return el("div", { class: "toolres" + (isErr ? " err" : "") },
    el("div", { class: "role", text: isErr ? "tool result (error)" : "tool result" }),
    el("div", { class: "text", text: partsText(content) }));
}

// makeToolResultNode/updateToolResultNode: the draft's tool_result view
// (t.output/t.is_error, as accumulated by handleDrillEvent's tool.end
// handling), kept separate from renderToolResult (durable message parts,
// content/isErr) since only the draft's copy is ever updated in place.
function makeToolResultNode(t) {
  const roleDiv = el("div", { class: "role" });
  const textDiv = el("div", { class: "text" });
  const node = el("div", { class: "toolres" }, roleDiv, textDiv);
  node._role = roleDiv;
  node._text = textDiv;
  updateToolResultNode(node, t);
  return node;
}

function updateToolResultNode(node, t) {
  const isErr = !!t.is_error;
  node.className = "toolres" + (isErr ? " err" : "");
  node._role.textContent = isErr ? "tool result (error)" : "tool result";
  node._text.textContent = partsText(t.output);
}

function renderBanner(b) {
  const cls = b.type === "session.aborted" ? "banner abort" : "banner";
  const label = b.type === "session.aborted" ? "aborted" : "error";
  return el("div", { class: cls, text: b.text ? label + ": " + b.text : label });
}

/* ---------- streaming draft: a single persistent element, patched in place ----------
   Recreating the draft bubble on every text.delta/tool.start/tool.end (the
   old renderDraft) meant an expanded tool_call block snapped back to
   collapsed on the very next token. createDraftEl builds the bubble once;
   updateDraftEl mutates its existing children (text nodes, and per-tool
   <details> looked up by call_id) instead of replacing them. */
function createDraftEl() {
  const roleDiv = el("div", { class: "role", text: "assistant" });
  const wrap = el("div", { class: "msg streaming" }, roleDiv);
  const toolsBox = el("div", { class: "tools" });
  wrap.append(toolsBox);
  const bubbleText = el("div", { class: "text" });
  const bubble = el("div", { class: "bubble assistant" }, bubbleText);
  wrap._toolsBox = toolsBox;
  wrap._bubble = bubble;
  wrap._bubbleText = bubbleText;
  wrap._bubbleAppended = false;
  wrap._reasoningEl = null;
  wrap._toolNodes = new Map();
  return wrap;
}

function updateDraftTool(draftEl, t) {
  let entry = draftEl._toolNodes.get(t.call_id);
  if (!entry) {
    const callNode = makeToolCallNode(t);
    draftEl._toolsBox.append(callNode);
    entry = { callNode, resultNode: null };
    draftEl._toolNodes.set(t.call_id, entry);
  }
  entry.callNode._summary.textContent = toolSummaryText(t);
  entry.callNode._pre.textContent = prettyJSON(t.arguments);
  if (t.output !== undefined || t.is_error) {
    if (!entry.resultNode) {
      entry.resultNode = makeToolResultNode(t);
      // Matches the historical ordering: the result renders just before its
      // tool_call block.
      draftEl._toolsBox.insertBefore(entry.resultNode, entry.callNode);
    } else {
      updateToolResultNode(entry.resultNode, t);
    }
  }
}

function updateDraftEl(draftEl, d) {
  if (d.reasoning) {
    if (!draftEl._reasoningEl) {
      draftEl._reasoningEl = makeReasoningNode(d.reasoning);
      draftEl.insertBefore(draftEl._reasoningEl, draftEl._toolsBox);
    } else {
      draftEl._reasoningEl._text.textContent = d.reasoning;
    }
  }
  for (const t of d.tools) updateDraftTool(draftEl, t);
  if (d.text) {
    draftEl._bubbleText.textContent = d.text;
    if (!draftEl._bubbleAppended) {
      draftEl.append(draftEl._bubble);
      draftEl._bubbleAppended = true;
    }
  }
}

/* ---------- composer + goal panel ---------- */

function selectedSessionRecord() {
  if (!drill.boxId || !drill.sessionId) return null;
  const rt = boxRuntime.get(drill.boxId);
  return (rt && rt.sessions.get(drill.sessionId)) || null;
}

function selectedBusy() {
  const s = selectedSessionRecord();
  const badge = sessionBadge(s || {});
  return badge !== "idle";
}

function updateComposer() {
  const has = !!(drill.boxId && drill.sessionId);
  $("composer").style.display = has ? "" : "none";
  const busy = selectedBusy();
  $("promptBox").disabled = !has || busy;
  $("sendBtn").disabled = !has || busy;
  $("abortBtn").disabled = !has;
  $("promptBox").placeholder = busy ? "session is busy\u2026" : "Message\u2026 (Enter to send, Shift+Enter for newline)";
}

function renderGoalPanel() {
  const gp = $("goalpanel");
  gp.textContent = "";
  if (!drill.boxId || !drill.sessionId) return;
  if (drill.goal && drill.goal.condition) {
    const state = drill.goal.achieved ? "achieved" : drill.goal.active ? "active" : "cleared";
    // Collapsed by default (drill.goalExpanded persists across the frequent
    // re-renders from polls/events and resets on session change): the panel
    // is a status strip, not a document \u2014 the feed gets the space.
    const cond = el("div", { class: "goalcond" + (drill.goalExpanded ? "" : " clamped"), text: drill.goal.condition });
    const chip = el("div", { class: "goalnarr " + (state === "active" ? "set" : state === "achieved" ? "achieved" : "cleared") },
      el("span", { class: "goaltag", text: "current goal \u00b7 " + state }),
      cond);
    if (drill.goal.condition.length > 160 || drill.goal.condition.indexOf("\n") !== -1) {
      chip.append(el("button", {
        class: "goaltoggle",
        text: drill.goalExpanded ? "show less" : "show full goal",
        onclick: () => { drill.goalExpanded = !drill.goalExpanded; renderGoalPanel(); },
      }));
    }
    if (drill.goal.reason) chip.append(el("div", { class: "goalreason", text: drill.goal.reason }));
    gp.append(chip);
    if (!drill.goal.active) {
      gp.append(el("button", { class: "small rearm", text: "\ud83d\udd01 Re-arm this goal", onclick: prefillRearm }));
    }
  }
}

function prefillRearm() {
  if (!drill.goal) return;
  $("goalForm").style.display = "";
  $("goalCondition").value = drill.goal.condition || "";
  $("goalMaxTurns").value = 0;
  $("goalCondition").focus();
}

async function sendPrompt() {
  const text = $("promptBox").value.trim();
  if (!text || !drill.boxId || !drill.sessionId) return;
  const b = box(drill.boxId);
  $("composerNotice").textContent = "";
  try {
    const resp = await boxAPI(b, "POST", "/session/" + drill.sessionId + "/prompt_async", { parts: [{ type: "text", text }] });
    if (resp.status === 202) { $("promptBox").value = ""; }
    else if (resp.status === 409) { $("composerNotice").textContent = "session is busy \u2014 wait for it to finish"; }
    else { $("composerNotice").textContent = "send failed (" + resp.status + ")"; }
  } catch (e) { $("composerNotice").textContent = "send failed: " + e.message; }
}

async function submitGoal() {
  const condition = $("goalCondition").value.trim();
  const maxTurns = parseInt($("goalMaxTurns").value, 10) || 0;
  if (!condition || !drill.boxId || !drill.sessionId) return;
  const b = box(drill.boxId);
  $("composerNotice").textContent = "";
  try {
    const resp = await boxAPI(b, "POST", "/session/" + drill.sessionId + "/goal", { condition, max_turns: maxTurns });
    if (resp.status === 202) {
      $("goalForm").style.display = "none";
    } else {
      const body = await resp.json().catch(() => ({}));
      $("composerNotice").textContent = "goal failed (" + resp.status + "): " + (body.error || "");
    }
  } catch (e) { $("composerNotice").textContent = "goal failed: " + e.message; }
}

async function clearGoal() {
  if (!drill.boxId || !drill.sessionId) return;
  const b = box(drill.boxId);
  try { await boxAPI(b, "DELETE", "/session/" + drill.sessionId + "/goal"); }
  catch (e) { $("composerNotice").textContent = "clear goal failed: " + e.message; }
}

async function abortSession() {
  if (!drill.boxId || !drill.sessionId) return;
  const b = box(drill.boxId);
  try { await boxAPI(b, "POST", "/session/" + drill.sessionId + "/abort"); }
  catch (e) { $("composerNotice").textContent = "abort failed: " + e.message; }
}

async function quickNewSession(boxId) {
  const b = box(boxId);
  if (!b) return;
  try {
    const resp = await boxAPI(b, "POST", "/session", {});
    if (resp.status === 201) {
      const s = await resp.json();
      const rt = ensureRuntime(boxId);
      rt.sessions.set(s.id, s);
      expandedBoxes.add(boxId);
      selectSession(boxId, s.id);
    } else {
      $("headerNotice").textContent = "new session failed (" + resp.status + ")";
    }
  } catch (e) { $("headerNotice").textContent = "new session failed: " + e.message; }
}

function openRearmModal(boxId, s) {
  selectSession(boxId, s.id);
  prefillRearm();
}

/* ---------- box management: add / remove ---------- */

function randomID() {
  return "box_" + Math.random().toString(16).slice(2) + Date.now().toString(16);
}

function addBox({ name, base, token }) {
  base = String(base || "").trim().replace(/\/+$/, "");
  token = String(token || "").trim();
  name = String(name || "").trim() || base;
  if (!base || !token) return false;
  const b = { id: randomID(), name, base, token };
  hs.boxes.push(b);
  persist();
  expandedBoxes.add(b.id);
  connectBox(b.id);
  renderFleet();
  return true;
}

function removeBox(id) {
  disconnectBox(id);
  hs.boxes = hs.boxes.filter(b => b.id !== id);
  if (hs.view && hs.view.box === id) hs.view = {};
  if (drill.boxId === id) { closeDrillConn(); drill.boxId = null; drill.sessionId = null; renderDrill(); }
  expandedBoxes.delete(id);
  boxRuntime.delete(id);
  persist();
  renderFleet();
}

/* ---------- modals ---------- */

function closeModal() { $("modalHost").textContent = ""; }

function openAddBoxModal() {
  const nameIn = el("input", { id: "mAddName", placeholder: "e.g. staging-1" });
  const baseIn = el("input", { id: "mAddBase", placeholder: "http://localhost:4096" });
  const tokIn = el("input", { id: "mAddToken", type: "password", placeholder: "run token" });
  const notice = el("div", { class: "notice" });
  const modal = el("div", { class: "modal" },
    el("h2", { text: "Add box" }),
    el("div", { class: "field" }, el("label", { text: "Name" }), nameIn),
    el("div", { class: "field" }, el("label", { text: "Base URL" }), baseIn),
    el("div", { class: "field" }, el("label", { text: "Run token" }), tokIn),
    notice,
    el("div", { class: "row" },
      el("button", { class: "primary", text: "Add", onclick: () => {
        if (addBox({ name: nameIn.value, base: baseIn.value, token: tokIn.value })) closeModal();
        else notice.textContent = "base URL and token are required";
      } }),
      el("button", { text: "Cancel", onclick: closeModal }),
    ),
  );
  showModal(modal);
  baseIn.focus();
}

function showModal(modal) {
  const host = $("modalHost");
  host.textContent = "";
  const backdrop = el("div", { class: "modal-backdrop", onclick: (e) => { if (e.target === backdrop) closeModal(); } }, modal);
  host.append(backdrop);
}

function openDispatchModal(boxId) {
  const b = box(boxId);
  if (!b) return;
  const modelIn = el("input", { placeholder: "provider/model or alias (optional)" });
  const condIn = el("textarea", { class: "big", placeholder: "Completion condition\u2026 multi-paragraph is fine \u2014 this is the whole point." });
  const maxTurnsIn = el("input", { type: "number", min: "0", value: "0" });
  const notice = el("div", { class: "notice" });
  const modal = el("div", { class: "modal" },
    el("h2", { text: "Dispatch on " + b.name }),
    el("div", { class: "field" }, el("label", { text: "Model (optional)" }), modelIn),
    el("div", { class: "field" }, el("label", { text: "Completion condition" }), condIn),
    el("div", { class: "field" }, el("label", { text: "Max turns (0 = unlimited)" }), maxTurnsIn),
    notice,
    el("div", { class: "row" },
      el("button", { class: "primary", text: "Dispatch", onclick: async () => {
        const condition = condIn.value.trim();
        if (!condition) { notice.textContent = "a completion condition is required"; return; }
        notice.textContent = "creating session\u2026";
        try {
          const body = {};
          if (modelIn.value.trim()) body.model = modelIn.value.trim();
          const created = await boxAPI(b, "POST", "/session", body);
          if (created.status !== 201) { notice.textContent = "create session failed (" + created.status + ")"; return; }
          const sess = await created.json();
          const rt = ensureRuntime(boxId);
          rt.sessions.set(sess.id, sess);
          notice.textContent = "starting goal\u2026";
          const maxTurns = parseInt(maxTurnsIn.value, 10) || 0;
          const goalResp = await boxAPI(b, "POST", "/session/" + sess.id + "/goal", { condition, max_turns: maxTurns });
          if (goalResp.status !== 202) {
            const eb = await goalResp.json().catch(() => ({}));
            notice.textContent = "goal failed (" + goalResp.status + "): " + (eb.error || "");
            return;
          }
          expandedBoxes.add(boxId);
          closeModal();
          selectSession(boxId, sess.id);
        } catch (e) { notice.textContent = "dispatch failed: " + e.message; }
      } }),
      el("button", { text: "Cancel", onclick: closeModal }),
    ),
  );
  showModal(modal);
  condIn.focus();
}

/* ---------- spawn box: the hub's own (same-origin) SSE API ---------- */

function openSpawnModal() {
  // The new box gets an auto-generated adjective-noun-NN name — no operator
  // input required. It's editable afterward from the box card if desired.
  const name = randomSlug();
  const log = el("div", { class: "spawnlog", text: "" });
  const notice = el("div", { class: "notice" });
  const startBtn = el("button", { class: "primary", text: "Spawn" });
  const modal = el("div", { class: "modal" },
    el("h2", { text: "Spawn a new box" }),
    el("div", {}, "Runs this hub's configured -spawn-command / $HARNESS_HUB_SPAWN and streams its output below. See the contract in this page's header comment."),
    el("div", { class: "field" }, el("label", { text: "Name" }), el("code", { text: name })),
    notice, log,
    el("div", { class: "row" }, startBtn, el("button", { text: "Close", onclick: closeModal })),
  );
  showModal(modal);
  startBtn.onclick = () => runSpawn(name, log, notice, startBtn);
  startBtn.focus();
}

async function runSpawn(name, log, notice, startBtn) {
  startBtn.disabled = true;
  notice.textContent = "";
  log.textContent = "";
  try {
    const resp = await fetch("/spawn", { method: "POST" });
    if (!resp.body) throw new Error("no response body");
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let finished = false;
    const parse = createSSEParser(frame => {
      let ev; try { ev = JSON.parse(frame.data); } catch { return; }
      if (ev.type === "stdout") {
        log.textContent += (log.textContent ? "\n" : "") + ev.line;
        log.scrollTop = log.scrollHeight;
      } else if (ev.type === "done") {
        finished = true;
        if (ev.error) {
          notice.textContent = "spawn failed: " + ev.error;
        } else if (ev.tunnel_url && ev.run_token) {
          addBox({ name: name || ev.tunnel_url, base: ev.tunnel_url, token: ev.run_token });
          notice.textContent = "box added: " + ev.tunnel_url;
        } else {
          notice.textContent = "spawn finished (exit " + ev.exit_code + ") but no TUNNEL_URL=/RUN_TOKEN= lines were found \u2014 add the box by hand.";
        }
      }
    });
    for (;;) {
      const { value, done } = await reader.read();
      if (done) break;
      parse(dec.decode(value, { stream: true }));
    }
    if (!finished) notice.textContent = "spawn stream ended unexpectedly";
  } catch (e) {
    notice.textContent = "spawn failed: " + e.message;
  } finally {
    startBtn.disabled = false;
  }
}

/* ---------- notifications ---------- */

function notify(boxId, sessionId, notice) {
  if (!hs.notify) return;
  if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
  const b = box(boxId);
  const title = notice.title + " \u00b7 " + (b ? b.name : boxId) + " / " + shortId(sessionId);
  try { new Notification(title, { body: notice.body }); } catch { /* best-effort */ }
}

function updateNotifyButton() {
  const btn = $("notifyBtn");
  btn.classList.toggle("on", !!hs.notify);
  btn.textContent = hs.notify ? "\ud83d\udd14 Notify: on" : "\ud83d\udd14 Notify";
}

async function toggleNotify() {
  if (!hs.notify) {
    if (typeof Notification !== "undefined" && Notification.permission !== "granted") {
      try { await Notification.requestPermission(); } catch { /* ignore */ }
    }
  }
  hs.notify = !hs.notify;
  persist();
  updateNotifyButton();
}

/* ---------- copy hub link ---------- */

async function copyHubLink() {
  const url = location.href;
  try {
    await navigator.clipboard.writeText(url);
    $("headerNotice").textContent = "hub link copied";
  } catch {
    $("headerNotice").textContent = url;
  }
  setTimeout(() => { $("headerNotice").textContent = ""; }, 4000);
}

/* ---------- wiring + bootstrap ---------- */

$("addBoxBtn").onclick = openAddBoxModal;
$("spawnBtn").onclick = openSpawnModal;
$("notifyBtn").onclick = toggleNotify;
$("copyLinkBtn").onclick = copyHubLink;
$("sendBtn").onclick = sendPrompt;
$("abortBtn").onclick = abortSession;
$("clearGoalBtn").onclick = clearGoal;
$("goalSubmitBtn").onclick = submitGoal;
$("setGoalToggleBtn").onclick = () => {
  const f = $("goalForm");
  f.style.display = f.style.display === "none" ? "" : "none";
};
$("promptBox").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!$("sendBtn").disabled) sendPrompt(); }
});

function bootstrap() {
  loadFromLocation();
  updateNotifyButton();
  for (const b of hs.boxes) { expandedBoxes.add(b.id); connectBox(b.id); }
  renderFleet();
  updateComposer();
  const view = hs.view || {};
  if (view.box && view.session && box(view.box)) {
    selectSession(view.box, view.session);
  } else {
    renderDrill();
  }
}

bootstrap();
</script>
